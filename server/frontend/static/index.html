<html>

<head>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

<script>

function login(e){

e.preventDefault();

let username=
document.getElementById("username").value;

sessionStorage.setItem(
"username",
username
);

window.location="/djangoapp/dealers";

}

</script>

</head>

<body>

<div
class="container"
style="width:40%;
margin-top:100px;">

<div class="card p-4">

<h2>Login</h2>

<form onsubmit="login(event)">

<input
id="username"
class="form-control"
placeholder="Username">

<br>

<input
type="password"
class="form-control"
placeholder="Password">

<br>

<button
class="btn btn-primary"
type="submit">

Login

</button>

</form>

</div>

</div>

</body>

</html>
