<html>
<head>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <script>
    function getDealerId() {
      const parts = window.location.pathname.split("/");
      return parts[parts.length - 1];
    }

    window.onload = function () {
      const dealerId = getDealerId();
      const savedReview = localStorage.getItem(`dealer_review_${dealerId}`);

      if (savedReview) {
        const reviewBox = document.getElementById("local-review-box");
        reviewBox.innerHTML = `
          <div class="card p-3 mb-3 border-success">
            <h4>Your Review</h4>
            <p>${savedReview}</p>
          </div>
        `;
      }
    };
  </script>
</head>

<body>
  <div class="container mt-4">

    <h1>{{dealer.full_name}}</h1>

    <p><b>City:</b> {{dealer.city}}</p>
    <p><b>State:</b> {{dealer.state}}</p>

    <div id="local-review-box"></div>

    <h3>Reviews</h3>

    {% for review in reviews %}
      <div class="card p-3 mb-3">
        <p>{{review.review}}</p>
        <p><b>Reviewer:</b> {{review.name}}</p>
      </div>
    {% endfor %}

    <a class="btn btn-success" href="/djangoapp/review/{{dealer.id}}">
      Review Dealer
    </a>

  </div>
</body>
</html>
